<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Hub - 模型中转站</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Model Hub</h1>
      <span>模型中转站</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#models" class="nav-item" data-tab="models">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        模型管理
      </a>
      <a href="#keys" class="nav-item" data-tab="keys">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
        API 密钥
      </a>
      <a href="#logs" class="nav-item" data-tab="logs">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        请求日志
      </a>
    </nav>
    <div class="sidebar-footer">
      <span class="status-dot" id="server-status"></span>
      <span id="server-status-text">检测中...</span>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <!-- Pages render here -->
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pages/models.js"></script>
  <script src="/js/pages/keys.js"></script>
  <script src="/js/pages/logs.js"></script>
  <script>
    App.init();
  </script>
</body>
</html>
